name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    # Android AOT + full tri-TFM compile can exceed 45 minutes on congested runners; keep headroom for publish + release upload.
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: install workloads
        shell: pwsh
        run: |
          dotnet workload install wasm-tools
          $onMain = $env:GITHUB_REF -eq 'refs/heads/main' -and ($env:GITHUB_EVENT_NAME -eq 'push' -or $env:GITHUB_EVENT_NAME -eq 'workflow_dispatch')
          if ($onMain) {
            dotnet workload install android
          }

      - name: restore
        run: dotnet restore

      - name: build (wasm + desktop)
        shell: pwsh
        run: |
          dotnet build -c Release -f net9.0-browserwasm /p:TreatWarningsAsErrors=true --no-restore
          dotnet build -c Release -f net9.0-desktop /p:TreatWarningsAsErrors=true --no-restore

      - name: build (android, main only)
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: dotnet build -c Release -f net9.0-android /p:TreatWarningsAsErrors=true --no-restore

      - name: publish wasm
        run: >
          dotnet publish LabsResponsiveShell/LabsResponsiveShell.csproj
          -c Release -f net9.0-browserwasm
          -o artifacts/wasm /p:TreatWarningsAsErrors=true

      - uses: actions/upload-artifact@v4
        with:
          name: wasm
          path: artifacts/wasm
          if-no-files-found: error
          retention-days: 14

      - name: publish desktop (main)
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: >
          dotnet publish LabsResponsiveShell/LabsResponsiveShell.csproj
          -c Release -f net9.0-desktop
          -o publish/desktop
          /p:TreatWarningsAsErrors=true

      - name: zip desktop (main)
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        shell: pwsh
        run: Compress-Archive -Path publish/desktop/* -DestinationPath labs-responsive-shell-net9.0-desktop.zip -Force

      - name: publish android (main)
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: >
          dotnet publish LabsResponsiveShell/LabsResponsiveShell.csproj
          -c Release -f net9.0-android
          -o publish/android
          /p:TreatWarningsAsErrors=true

      - name: stage apk (main)
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        shell: pwsh
        run: |
          $apk = Get-ChildItem -Path publish/android -Filter *.apk -Recurse | Select-Object -First 1
          if (-not $apk) { throw "No APK produced under publish/android" }
          Copy-Item $apk.FullName -Destination labs-responsive-shell-net9.0-android.apk -Force

      - uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        with:
          name: desktop-windows
          path: labs-responsive-shell-net9.0-desktop.zip
          if-no-files-found: error
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        with:
          name: android-apk
          path: labs-responsive-shell-net9.0-android.apk
          if-no-files-found: error
          retention-days: 30

      - name: upsert continuous release (main)
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if ! gh release view continuous --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create continuous \
              --repo "${GITHUB_REPOSITORY}" \
              --prerelease \
              --title "Continuous (main)" \
              --notes "Windows desktop (.zip) and Android (.apk) from the latest successful build on \`main\`. Tag is stable for URLs; assets are replaced each run." \
              --target "${GITHUB_SHA}"
          fi
          gh release upload continuous \
            labs-responsive-shell-net9.0-desktop.zip \
            labs-responsive-shell-net9.0-android.apk \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
