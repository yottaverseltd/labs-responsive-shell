name: release-desktop

# Publishes net9.0-desktop output as a zip attached to a GitHub Release for tag v*.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: publish net9.0-desktop
        run: >
          dotnet publish LabsResponsiveShell/LabsResponsiveShell.csproj
          -c Release -f net9.0-desktop
          -o publish/out
          /p:TreatWarningsAsErrors=true

      - name: zip publish output
        shell: pwsh
        run: Compress-Archive -Path publish/out/* -DestinationPath labs-responsive-shell-net9.0-desktop.zip -Force

      - name: upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: labs-responsive-shell-net9.0-desktop.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
